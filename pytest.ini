[pytest]
# brief 604: bootstrapping tools/m2c_bootstrap.py (an existing, documented,
# gitignored vendor step -- also used by decomp-permuter) vendors third-party
# test suites under tools/_vendor/**/tests/ that pytest's default rootdir-wide
# discovery picks up and fails to collect (they expect their OWN repo layout,
# not this one). No prior pytest.ini existed to scope collection, so this was
# a latent gap -- nobody had bootstrapped a vendor tool and run the full suite
# from repo root in the same session before. All of this project's own tests
# already live under tests/; scope discovery there explicitly.
testpaths = tests

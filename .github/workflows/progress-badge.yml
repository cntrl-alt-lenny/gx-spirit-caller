name: Update progress badge

on:
  push:
    branches: [main]
    paths:
      # Symbol graph changes (renames, new symbols).
      - 'config/**/symbols.txt'
      # TU-carving changes — `complete` markers here are the primary
      # signal the delinks.txt tier of progress.py reads when CI
      # can't run ninja.
      - 'config/**/delinks.txt'
      # New matched source files — the actual progress.
      - 'src/**/*.c'
      - 'src/**/*.cpp'
      # Progress tooling itself.
      - 'tools/progress.py'
      - 'tools/update_progress_badge.py'
      # README so a manual badge edit doesn't get stuck stale.
      - 'README.md'
  schedule:
    # Weekly backstop in case something slips past the path filter.
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Serialise so two pushes in quick succession don't race.
  # cancel-in-progress is false because the second run is idempotent
  # — letting it complete is fine, and avoids "ran but nothing
  # happened" gaps in the action log.
  group: progress-badge
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch with full history so the push doesn't reject as
          # non-fast-forward when a sibling commit lands between
          # checkout and push.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update README badge
        id: update
        run: |
          python tools/update_progress_badge.py --version eur
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push badge update directly to main
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # `[skip ci]` keeps the workflow from re-triggering itself on
          # the README path filter — defensive belt-and-braces; GitHub's
          # default workflow-token-push-doesn't-trigger-workflows rule
          # already covers this, but the marker makes the intent explicit
          # in the commit log.
          MSG="chore: update README progress badge [skip ci]"

          # Rebase-on-failure retry: if main moves between checkout
          # and push, reset to the new tip, recompute the badge, and
          # retry. Bounded to 3 attempts so a fully-broken state can
          # still fail the workflow rather than spin forever.
          for attempt in 1 2 3; do
            git add README.md
            git commit -m "$MSG"
            if git push origin HEAD:main; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            # Push rejected — main moved. Reset to its new tip and
            # recompute. If the badge is already correct on the new
            # tip, the next iteration's `git diff --quiet` will be
            # clean and we exit 0 with no push needed.
            git fetch origin main
            git reset --hard origin/main
            python tools/update_progress_badge.py --version eur
            if git diff --quiet README.md; then
              echo "main already has the correct badge after rebase; nothing to do"
              exit 0
            fi
          done

          echo "failed to push after 3 attempts"
          exit 1

name: Update progress visuals

on:
  push:
    branches: [main]
    paths:
      # Symbol graph changes (renames, new symbols).
      - 'config/**/symbols.txt'
      # TU-carving changes — `complete` markers drive the delinks-tier
      # numbers both visuals read when CI can't run a baserom build.
      - 'config/**/delinks.txt'
      # New matched source files — the actual progress.
      - 'src/**/*.c'
      - 'src/**/*.cpp'
      - 'src/**/*.s'
      # Progress tooling itself.
      - 'tools/progress.py'
      - 'tools/generate_progress_bars.py'
      - 'tools/generate_heatmap.py'
  schedule:
    # Weekly backstop in case something slips past the path filter.
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Serialise so two pushes in quick succession don't race.
  # cancel-in-progress is false because the second run is idempotent.
  group: progress-visuals
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the push doesn't reject as non-fast-forward
          # when a sibling commit lands between checkout and push.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # All visuals regenerate from the committed delinks.txt (the
      # no-baserom synthesis path), so CI can keep them current without a
      # build. The README badge row is now static (sha1/modules/license);
      # the live per-region numbers live in the combined bar SVG.
      - name: Regenerate progress visuals
        id: gen
        run: |
          python tools/generate_progress_bars.py
          for v in eur usa jpn; do
            python tools/generate_heatmap.py --version "$v"
          done
          tracked='assets/progress-combined.svg assets/progress-heatmap-eur.svg assets/progress-heatmap-usa.svg assets/progress-heatmap-jpn.svg'
          if git diff --quiet $tracked; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit regenerated visuals to main
        if: steps.gen.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          MSG="chore: update progress visuals [skip ci]"

          regen() {
            python tools/generate_progress_bars.py
            for v in eur usa jpn; do
              python tools/generate_heatmap.py --version "$v"
            done
          }
          tracked='assets/progress-combined.svg assets/progress-heatmap-eur.svg assets/progress-heatmap-usa.svg assets/progress-heatmap-jpn.svg'

          # main is protected (ruleset main-protection) and github-actions[bot]
          # cannot bypass on a personal repo, so publish regenerated SVGs to an
          # unprotected `progress-visuals` branch. README references its raw URLs.
          git add $tracked
          git commit -m "$MSG"
          git push --force origin HEAD:refs/heads/progress-visuals
          echo "published regenerated visuals to progress-visuals"

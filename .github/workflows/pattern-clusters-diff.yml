name: Pattern-cluster impact

# On every PR that could shift the ready-to-propagate pattern-cluster
# state — symbols.txt OR delinks.txt OR the pattern-cluster tooling —
# post or update a single PR comment showing:
#   - drained:     existing cluster's unmatched count dropped
#   - newly-ready: cluster gained its first matched template
#   - closed:      cluster fully consumed (no more unmatched siblings)
#
# Companion to:
#   cascades-diff.yml          per-rename one-step impact
#   mega-cascades-diff.yml     top-N transitive ranking shift
#   pattern-clusters-diff.yml  this — cluster drainage view
#
# Pattern mirrors worklist-diff.yml / analyzer.yml — single upserted
# comment keyed by a footer marker.

on:
  pull_request:
    paths:
      # delinks.txt is the primary cluster-state signal: TUs going
      # `partial` → `complete` is what flips functions from unmatched
      # to matched.
      - 'config/**/symbols.txt'
      - 'config/**/delinks.txt'
      - 'tools/find_pattern_clusters.py'
      - 'tools/ci_format_pattern_clusters.py'
      - 'tools/analyze_symbols.py'
      - 'tools/next_targets.py'
      - 'tools/propagate_template.py'
      - '.github/workflows/pattern-clusters-diff.yml'

permissions:
  contents: read

jobs:
  pr-pattern-clusters-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR (with full history for base-branch snapshot)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install Python deps
        run: pip install -r tools/requirements.txt

      - name: Materialise base-branch config via git worktree
        id: base
        # Same fall-back semantics as cascades-diff / mega-cascades-diff.
        run: |
          set +e
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          git worktree add /tmp/base-tree \
              origin/${{ github.event.pull_request.base.ref }}
          if [ ! -d /tmp/base-tree/config/eur ]; then
            echo "::warning::base-branch config/eur not present; "\
                 "rendering no-base placeholder."
            echo "have_base=0" >> "${GITHUB_OUTPUT}"
          else
            echo "have_base=1" >> "${GITHUB_OUTPUT}"
          fi

      - name: Render pattern-cluster diff as Markdown
        run: |
          if [ "${{ steps.base.outputs.have_base }}" = "1" ]; then
            python tools/ci_format_pattern_clusters.py \
                --before-config /tmp/base-tree/config/eur \
                --after-config config/eur \
                --version eur \
                --top-rows 10 \
                -o /tmp/comment.md
          else
            python tools/ci_format_pattern_clusters.py \
                --before-config /nonexistent \
                --after-config config/eur \
                --version eur \
                --top-rows 10 \
                -o /tmp/comment.md
          fi

      - name: Upsert PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Identical upsert pattern to cascades-diff.yml /
        # mega-cascades-diff.yml / worklist-diff.yml.
        run: |
          set -euo pipefail
          MARKER='<sub>🤖 Generated by `tools/ci_format_pattern_clusters.py`'
          PR=${{ github.event.pull_request.number }}
          existing_id=$(
            gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
              --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
              | head -n1 || true
          )
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${existing_id}" \
              -f body="$(cat /tmp/comment.md)"
          else
            gh pr comment "${PR}" --body-file /tmp/comment.md \
                --repo "${{ github.repository }}"
          fi

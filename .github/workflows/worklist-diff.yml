name: Worklist diff

# On every PR that could move the `next_targets.py` worklist (config/
# carvings, src/ additions, or the relevant tool files), post or
# update a single PR comment showing:
#   - matches landed (items moved from unmatched to matched)
#   - new worklist candidates (dsd init / rename surfaces)
#   - tier migrations
#   - per-tier matched-count delta
#
# Pattern mirrors analyzer.yml (which renders analyze_symbols tier
# deltas) and match-invariants.yml (which renders metadata hygiene
# reports). Three tools for three different lenses on "what did this
# PR actually do?".

on:
  pull_request:
    paths:
      - 'config/**'
      - 'src/**'
      - 'tools/next_targets.py'
      - 'tools/ci_format_worklist_diff.py'
      - 'tools/analyze_symbols.py'
      - 'tools/progress.py'
      - '.github/workflows/worklist-diff.yml'

permissions:
  contents: read

jobs:
  pr-worklist-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR (with full history for base-branch snapshot)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install Python deps
        run: pip install -r tools/requirements.txt

      - name: Snapshot worklist on base branch
        # Use a git worktree of the base so next_targets.py runs
        # against that commit's config/ + tools/. Falls back to an
        # empty-worklist JSON if the base snapshot fails (e.g. first
        # run on a branch where the tool didn't exist yet).
        run: |
          set +e
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          git worktree add /tmp/base-tree origin/${{ github.event.pull_request.base.ref }}
          (cd /tmp/base-tree && python tools/next_targets.py \
              --version eur >/dev/null 2>&1)
          base_exit=$?
          if [ "${base_exit}" -eq 0 ] \
              && [ -f /tmp/base-tree/build/eur/analysis/next_targets.json ]; then
            cp /tmp/base-tree/build/eur/analysis/next_targets.json /tmp/before.json
          else
            echo '{"version":"eur","tier_breakdown":{},"worklist":[]}' \
                > /tmp/before.json
            echo "::warning::base-branch snapshot failed or missing; "\
                 "treating as empty worklist (exit=${base_exit})."
          fi

      - name: Snapshot worklist on PR head
        run: |
          python tools/next_targets.py --version eur
          cp build/eur/analysis/next_targets.json /tmp/after.json

      - name: Render worklist diff as Markdown
        run: |
          python tools/ci_format_worklist_diff.py \
              /tmp/before.json /tmp/after.json -o /tmp/comment.md

      - name: Upsert PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Same upsert pattern as analyzer.yml / match-invariants.yml —
        # find the prior worklist-diff comment by its footer marker
        # and patch it in place, otherwise create one.
        run: |
          set -euo pipefail
          MARKER='<sub>🤖 Generated by `tools/ci_format_worklist_diff.py`'
          PR=${{ github.event.pull_request.number }}
          existing_id=$(
            gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
              --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
              | head -n1 || true
          )
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${existing_id}" \
              -f body="$(cat /tmp/comment.md)"
          else
            gh pr comment "${PR}" --body-file /tmp/comment.md \
                --repo "${{ github.repository }}"
          fi

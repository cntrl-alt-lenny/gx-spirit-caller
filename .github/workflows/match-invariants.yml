name: Match invariants

# Pre-flight metadata sanity checks for the decomp:
#   - src/ references a name not in symbols.txt + not declared in
#     libs/**/*.h — #171-class rebase drift (error, blocks merge)
#   - TU sources listed in delinks.txt but missing on disk (error)
#   - Orphan `extern` declarations in src/ whose target was renamed (warn)
#   - Placeholder-named symbols inside `complete` TUs (warn)
#
# On PRs: upserts a single comment summarising the findings. Job
# exit status reflects whether any error-severity issues were found
# (errors block merge iff this check is required in branch protection;
# warnings never block).
#
# Does NOT build the ROM or run dsd — this is a pure metadata check
# that works from the committed config/ files alone.

on:
  pull_request:
    paths:
      - 'config/**'
      - 'src/**'
      - 'tools/check_match_invariants.py'
      - 'tools/ci_format_invariants.py'
      - 'tools/progress.py'
      - 'tools/analyze_symbols.py'
      - '.github/workflows/match-invariants.yml'
  push:
    branches: [main]
    paths:
      - 'config/**'
      - 'src/**'
      - 'tools/check_match_invariants.py'

permissions:
  contents: read

jobs:
  pr-invariants:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [eur, usa, jpn]
    continue-on-error: ${{ matrix.version != 'eur' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install Python deps
        run: pip install -r tools/requirements.txt

      - name: Run invariants check
        id: invariants
        # Allow the step to complete (exit-1 on warnings is normal);
        # the final-exit step re-evaluates whether we block merge.
        run: |
          set +e
          python tools/check_match_invariants.py \
              --version ${{ matrix.version }} --json > /tmp/invariants-${{ matrix.version }}.json
          check_exit=$?
          echo "check_exit=${check_exit}" >> "$GITHUB_OUTPUT"
          # errors count lives in the JSON — parse it so we know
          # whether to hard-fail the job later.
          errors=$(python -c "import json; print(json.load(open('/tmp/invariants-${{ matrix.version }}.json'))['errors'])")
          echo "errors=${errors}" >> "$GITHUB_OUTPUT"

      - name: Format report as Markdown
        run: |
          python tools/ci_format_invariants.py \
              /tmp/invariants-${{ matrix.version }}.json -o /tmp/comment-${{ matrix.version }}.md

      - name: Upsert PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        # Shared upsert script — see .github/scripts/upsert-pr-comment.sh.
        run: |
          .github/scripts/upsert-pr-comment.sh \
            '<sub>🤖 Posted by `.github/workflows/match-invariants.yml` (${{ matrix.version }})' \
            /tmp/comment-${{ matrix.version }}.md

      - name: Block merge on error-severity issues only
        # Warnings are informational (brief 003 intentional-placeholder
        # cases). Errors represent build-breaking drift (e.g. a TU in
        # delinks.txt with no .c file) — those fail the job so they
        # surface red on the PR and can gate merge via branch protection.
        run: |
          errors=${{ steps.invariants.outputs.errors }}
          if [ "${errors}" -gt 0 ]; then
            echo "::error::Found ${errors} error-severity invariant issue(s)."
            echo "See the PR comment for details; re-run by pushing a fix."
            exit 1
          fi
          echo "No error-severity issues (warnings do not block merge)."

  main-baseline:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [eur, usa, jpn]
    continue-on-error: ${{ matrix.version != 'eur' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install Python deps
        run: pip install -r tools/requirements.txt

      - name: Run invariants check (errors only)
        # On main pushes, fail only on errors — we expect warnings on
        # main (intentional placeholders). This guards against a PR
        # sneaking through with a missing_tu_source.
        run: |
          set +e
          python tools/check_match_invariants.py --version ${{ matrix.version }} --json > /tmp/invariants-${{ matrix.version }}.json
          errors=$(python -c "import json; print(json.load(open('/tmp/invariants-${{ matrix.version }}.json'))['errors'])")
          if [ "${errors}" -gt 0 ]; then
            echo "::error::Found ${errors} error-severity invariant issue(s) on main."
            python tools/check_match_invariants.py --version ${{ matrix.version }}
            exit 1
          fi

name: Sync wiki

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - '.github/workflows/sync-wiki.yml'
  workflow_dispatch:

concurrency:
  group: sync-wiki
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone wiki repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki-repo

      - name: Mirror wiki/ into wiki repo
        run: |
          # Wipe everything except .git so deletions in wiki/ propagate.
          find wiki-repo -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R wiki/. wiki-repo/

      - name: Commit and push if changed
        working-directory: wiki-repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date."
            exit 0
          fi
          SHA="${GITHUB_SHA::7}"
          git commit -m "Sync wiki from main @ ${SHA}"
          # Wiki default branch is master; retry on transient network errors.
          for attempt in 1 2 3 4; do
            if git push origin HEAD:master; then
              exit 0
            fi
            sleep $((2 ** attempt))
          done
          echo "Failed to push to wiki after 4 attempts." >&2
          exit 1

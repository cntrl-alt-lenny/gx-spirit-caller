name: Mega-cascade ranking diff

# On every PR that could shift the mega-cascade ranking
# (`config/<ver>/**/symbols.txt` changes, or the cascade tooling
# itself), post or update a single PR comment showing how the
# top-N transitive-cascade leverage frontier moved.
#
# Companion to cascades-diff.yml:
#   cascades-diff.yml          → per-rename one-step impact
#   mega-cascades-diff.yml     → top-N ranking shift (this one)
#
# Pattern mirrors worklist-diff.yml / analyzer.yml — single upserted
# comment keyed by a footer marker.

on:
  pull_request:
    paths:
      - 'config/**/symbols.txt'
      - 'tools/find_cascades.py'
      - 'tools/find_mega_cascades.py'
      - 'tools/ci_format_mega_cascades.py'
      - 'tools/analyze_symbols.py'
      - 'tools/next_targets.py'
      - '.github/workflows/mega-cascades-diff.yml'

permissions:
  contents: read

jobs:
  pr-mega-cascades-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR (with full history for base-branch snapshot)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install Python deps
        run: pip install -r tools/requirements.txt

      - name: Materialise base-branch config via git worktree
        id: base
        # Same fall-back semantics as cascades-diff.yml: an empty
        # snapshot still produces a comment, so PR readers can tell
        # the workflow ran.
        run: |
          set +e
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          git worktree add /tmp/base-tree \
              origin/${{ github.event.pull_request.base.ref }}
          if [ ! -d /tmp/base-tree/config/eur ]; then
            echo "::warning::base-branch config/eur not present; "\
                 "rendering no-base placeholder."
            echo "have_base=0" >> "${GITHUB_OUTPUT}"
          else
            echo "have_base=1" >> "${GITHUB_OUTPUT}"
          fi

      - name: Render mega-cascade ranking diff as Markdown
        run: |
          if [ "${{ steps.base.outputs.have_base }}" = "1" ]; then
            python tools/ci_format_mega_cascades.py \
                --before-config /tmp/base-tree/config/eur \
                --after-config config/eur \
                --version eur \
                --top-n 20 \
                -o /tmp/comment.md
          else
            python tools/ci_format_mega_cascades.py \
                --before-config /nonexistent \
                --after-config config/eur \
                --version eur \
                --top-n 20 \
                -o /tmp/comment.md
          fi

      - name: Upsert PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Identical upsert pattern to cascades-diff.yml /
        # analyzer.yml / worklist-diff.yml / match-invariants.yml.
        run: |
          set -euo pipefail
          MARKER='<sub>🤖 Generated by `tools/ci_format_mega_cascades.py`'
          PR=${{ github.event.pull_request.number }}
          existing_id=$(
            gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
              --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
              | head -n1 || true
          )
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${existing_id}" \
              -f body="$(cat /tmp/comment.md)"
          else
            gh pr comment "${PR}" --body-file /tmp/comment.md \
                --repo "${{ github.repository }}"
          fi

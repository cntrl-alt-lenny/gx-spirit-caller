name: Cascades diff

# On every PR that could introduce renames (config/ or tools/
# rename_symbol.py changes), post or update a single PR comment
# showing per-rename cascade impact:
#   - how many size-≤0x80 callers promote hard → medium from each
#     placeholder-to-real rename in the PR
#
# Pattern mirrors worklist-diff.yml / analyzer.yml — single upserted
# comment keyed by a footer marker.

on:
  pull_request:
    paths:
      - 'config/**/symbols.txt'
      - 'tools/rename_symbol.py'
      - 'tools/find_cascades.py'
      - 'tools/ci_format_rename_cascades.py'
      - '.github/workflows/cascades-diff.yml'

permissions:
  contents: read

jobs:
  pr-cascades-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR (with full history for base-branch snapshot)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install Python deps
        run: pip install -r tools/requirements.txt

      - name: Materialise base-branch config via git worktree
        id: base
        # Fall back to skipping the diff (empty snapshot) if the
        # worktree add fails — e.g. when the base ref has been
        # deleted or the PR is from a fork with limited history.
        run: |
          set +e
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          git worktree add /tmp/base-tree \
              origin/${{ github.event.pull_request.base.ref }}
          if [ ! -d /tmp/base-tree/config/eur ]; then
            echo "::warning::base-branch config/eur not present; "\
                 "rendering empty cascade comment."
            echo "have_base=0" >> "${GITHUB_OUTPUT}"
          else
            echo "have_base=1" >> "${GITHUB_OUTPUT}"
          fi

      - name: Render rename-cascade diff as Markdown
        run: |
          if [ "${{ steps.base.outputs.have_base }}" = "1" ]; then
            python tools/ci_format_rename_cascades.py \
                --before-config /tmp/base-tree/config/eur \
                --after-config config/eur \
                -o /tmp/comment.md
          else
            # No base → render the empty-renames message so the
            # upsert still produces a comment (maintains UX
            # consistency; readers don't wonder if the workflow ran).
            python tools/ci_format_rename_cascades.py \
                --before-config /nonexistent \
                --after-config config/eur \
                -o /tmp/comment.md
          fi

      - name: Upsert PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Same upsert pattern as analyzer.yml / worklist-diff.yml /
        # match-invariants.yml.
        run: |
          set -euo pipefail
          MARKER='<sub>🤖 Generated by `tools/ci_format_rename_cascades.py`'
          PR=${{ github.event.pull_request.number }}
          existing_id=$(
            gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
              --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
              | head -n1 || true
          )
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${existing_id}" \
              -f body="$(cat /tmp/comment.md)"
          else
            gh pr comment "${PR}" --body-file /tmp/comment.md \
                --repo "${{ github.repository }}"
          fi
